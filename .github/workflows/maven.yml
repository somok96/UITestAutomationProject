name: Test Automation Workflow

on:
  schedule:
  - cron: 00 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Running Test Automation with Maven
      run: mvn test -X -DsuiteXmlFile=testng.xml -Dbrowser=chrome -DisLambdaTest=true -DisHeadless=false
 
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: Test Logs
        path: logs/

    - name: Upload Screenshots As Artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: screenshots
        path: screenshots/

    - name: Upload HTML Report As Artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: html-report
        path: report.html

    - name: Copy Report to gh-pages folder
      if: always()
      run: | 
        mkdir -p public/extent-reports
        cp -R report.html public/extent-reports
        cp -R screenshots/ public/extent-reports
    

    - name: Deploy
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public/extent-reports 
        token: ${{ secrets.PAT1234 }}
        clean: true

    - name: Test Execution Status
      if: always()
      run: echo "Test Execution Completed"
        
        
  
