name: Test Automation Workflow

on:
  schedule:
  - cron: 00 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Running Test Automation with Maven
      run: mvn test -X -DsuiteXmlFile=testng.xml -Dbrowser=chrome -DisLambdaTest=true -DisHeadless=false
 
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: Test Logs
        path: logs/

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: Test Reports
        path: report.html

    - name: Test Execution Status
      if: always()
      run: echo "Test Execution Completed"
        
        
  
